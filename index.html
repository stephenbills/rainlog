<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Rainlog" />
  <meta name="theme-color" content="#1a3a5c" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Rainlog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #f2f2f7; }
    #app { max-width: 480px; margin: 0 auto; height: 100dvh; display: flex; flex-direction: column; background: #fff; position: relative; }

    /* TOP BAR — shared across all views */
    .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; padding-top: calc(12px + env(safe-area-inset-top)); background: #1a3a5c; color: white; flex-shrink: 0; min-height: calc(54px + env(safe-area-inset-top)); }
    .top-bar-title { font-size: 18px; font-weight: 600; color: white; }
    .top-bar-sub { font-size: 13px; color: #a8c8e8; margin-top: 1px; }
    .nav-arrows { display: flex; align-items: center; gap: 8px; }
    .nav-arrows h2 { font-size: 18px; font-weight: 600; color: white; min-width: 150px; text-align: center; }
    .nav-arrows button { background: rgba(255,255,255,0.15); border: none; color: white; font-size: 20px; cursor: pointer; width: 34px; height: 34px; border-radius: 17px; display: flex; align-items: center; justify-content: center; line-height: 1; }
    .nav-arrows button:active { background: rgba(255,255,255,0.3); }
    .nav-arrows button:disabled { opacity: 0.3; cursor: default; }
    .monthly-total { font-size: 13px; color: #a8c8e8; text-align: right; }
    .today-btn { font-size: 11px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 4px 10px; border-radius: 10px; cursor: pointer; margin-top: 3px; display: block; }

    /* WEEKDAY HEADERS */
    .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); background: #122b45; flex-shrink: 0; }
    .weekdays span { text-align: center; font-size: 11px; color: #7aaacf; padding: 5px 0 6px; font-weight: 600; letter-spacing: 0.3px; }

    /* CALENDAR GRID */
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); flex: 1; border-left: 0.5px solid #ddd; border-top: 0.5px solid #ddd; overflow: hidden; }
    .day-cell { border-right: 0.5px solid #ddd; border-bottom: 0.5px solid #ddd; padding: 5px 6px; position: relative; cursor: pointer; background: #fff; display: flex; flex-direction: column; justify-content: space-between; min-height: 0; user-select: none; }
    .day-cell:active { opacity: 0.6; }
    .day-cell.other-month { background: #f5f5f7; }
    .day-cell.has-rain { background: #1e4976; }
    .day-cell.today { outline: 2px solid #4a9edd; outline-offset: -2px; }
    .day-num { font-size: 13px; font-weight: 500; color: #1c1c1e; line-height: 1; }
    .day-cell.other-month .day-num { color: #bbb; }
    .day-cell.has-rain .day-num { color: #cce5ff; }
    .rain-val { font-size: 13px; font-weight: 600; color: #90caff; line-height: 1; align-self: flex-end; }

    /* BOTTOM NAV */
    .bottom-nav { display: flex; border-top: 0.5px solid #ddd; background: #fff; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px 10px; font-size: 10px; color: #999; cursor: pointer; border: none; background: none; }
    .nav-btn svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
    .nav-btn.active { color: #1a3a5c; }

    /* VIEWS */
    .view { display: none; flex: 1; flex-direction: column; overflow-y: auto; overflow-x: hidden; }
    .view.active { display: flex; }

    /* GRAPH VIEW */
    .graph-view { padding: 0; gap: 0; overflow: hidden; }
    .graph-chart-area { flex: 1; padding: 8px 8px 0; min-height: 0; position: relative; }
    .graph-chart-area svg { width: 100%; height: 100%; display: block; }
    .graph-bottom { padding: 8px 12px 10px; flex-shrink: 0; }
    .legend { display: flex; gap: 14px; justify-content: center; margin-bottom: 10px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #555; }
    .legend-line { width: 20px; height: 3px; border-radius: 2px; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-card { background: #f5f5f7; border-radius: 10px; padding: 10px 12px; }
    .stat-label { font-size: 11px; color: #888; margin-bottom: 2px; }
    .stat-val { font-size: 20px; font-weight: 600; color: #1c1c1e; }
    .stat-unit { font-size: 11px; color: #888; font-weight: 400; }

    /* HISTORY VIEW */
    .history-view { overflow-y: auto; }
    .history-inner { padding: 16px; display: flex; flex-direction: column; gap: 16px; }
    .year-block h3 { font-size: 16px; font-weight: 600; color: #1c1c1e; margin-bottom: 10px; }
    .month-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .month-tile { background: #f5f5f7; border-radius: 8px; padding: 8px 10px; }
    .month-tile.has-data { background: #1e4976; }
    .m-name { font-size: 11px; color: #888; margin-bottom: 2px; }
    .month-tile.has-data .m-name { color: #7aaacf; }
    .m-val { font-size: 15px; font-weight: 600; color: #1c1c1e; }
    .month-tile.has-data .m-val { color: #e0f0ff; }
    .action-btn { padding: 13px; border-radius: 10px; font-size: 15px; cursor: pointer; border: 0.5px solid #ddd; background: #f5f5f7; color: #1a3a5c; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; margin-bottom: 8px; }
    .action-btn:active { opacity: 0.7; }
    .empty-msg { color: #999; font-size: 14px; padding: 20px 0; text-align: center; }
    .version-tag { text-align: center; font-size: 11px; color: #bbb; padding: 8px 0 4px; }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 16px; padding: 22px 20px; width: 290px; }
    .modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 18px; color: #1c1c1e; text-align: center; }
    .rain-input-wrap { display: flex; align-items: baseline; justify-content: center; gap: 6px; margin-bottom: 18px; }
    .rain-input-wrap input { font-size: 36px; font-weight: 300; text-align: right; border: none; border-bottom: 2px solid #1a3a5c; width: 110px; color: #1c1c1e; outline: none; background: transparent; padding: 4px 0; }
    .rain-input-wrap .unit { font-size: 20px; color: #888; }
    .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal-btns button { padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; border: 0.5px solid #ddd; background: #f5f5f7; color: #1c1c1e; }
    .modal-btns button.primary { background: #1a3a5c; color: white; border-color: #1a3a5c; }
    .modal-btns button:active { opacity: 0.7; }
    .clear-btn { width: 100%; padding: 10px; margin-top: 10px; border-radius: 10px; font-size: 14px; cursor: pointer; border: none; background: none; color: #c0392b; }
  </style>
</head>
<body>
<div id="app">

  <!-- CALENDAR VIEW -->
  <div id="cal-view" class="view active" style="flex-direction:column; overflow:hidden;">
    <div class="top-bar">
      <div class="nav-arrows">
        <button id="cal-prev" onclick="changeMonth(-1)" aria-label="Previous month">&#8249;</button>
        <h2 id="month-title"></h2>
        <button id="cal-next" onclick="changeMonth(1)" aria-label="Next month">&#8250;</button>
      </div>
      <div>
        <div class="monthly-total" id="monthly-total">Total: 0.0 mm</div>
        <button class="today-btn" onclick="goToday()">Today</button>
      </div>
    </div>
    <div class="weekdays">
      <span>SUN</span><span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span>
    </div>
    <div class="calendar-grid" id="cal-grid"></div>
  </div>

  <!-- GRAPH VIEW -->
  <div id="graph-view" class="view graph-view">
    <div class="top-bar">
      <div class="nav-arrows">
        <button id="graph-prev" onclick="changeGraphYear(-1)" aria-label="Previous year">&#8249;</button>
        <h2 id="graph-year-title"></h2>
        <button id="graph-next" onclick="changeGraphYear(1)" aria-label="Next year">&#8250;</button>
      </div>
      <div class="top-bar-sub" id="graph-total-sub"></div>
    </div>
    <div class="graph-chart-area">
      <svg id="graph-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="graph-bottom">
      <div class="legend" id="graph-legend"></div>
      <div class="stat-grid" id="stat-grid"></div>
    </div>
  </div>

  <!-- HISTORY VIEW -->
  <div id="history-view" class="view history-view">
    <div class="top-bar">
      <div class="top-bar-title">History</div>
    </div>
    <div class="history-inner">
      <div id="history-content"></div>
      <button class="action-btn" onclick="exportCSV()">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3m0 12-4-4m4 4 4-4M2 17l.621 2.485A2 2 0 0 0 4.561 21h14.878a2 2 0 0 0 1.94-1.515L22 17"/></svg>
        Export CSV
      </button>
      <button class="action-btn" onclick="document.getElementById('csv-import').click()">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0-12 4 4m-4-4L8 7M2 17l.621 2.485A2 2 0 0 0 4.561 21h14.878a2 2 0 0 0 1.94-1.515L22 17"/></svg>
        Import CSV
      </button>
      <input type="file" id="csv-import" accept=".csv" style="display:none" onchange="importCSV(event)" />
      <div class="version-tag">Rainlog v1.4</div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="switchView('cal')" id="nav-cal" aria-label="Calendar">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Calendar
    </button>
    <button class="nav-btn" onclick="switchView('graph')" id="nav-graph" aria-label="Graph">
      <svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 4-6"/></svg>
      Graph
    </button>
    <button class="nav-btn" onclick="switchView('history')" id="nav-history" aria-label="History">
      <svg viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
      History
    </button>
  </div>

</div>

<!-- ENTRY MODAL -->
<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <div class="rain-input-wrap">
      <input type="number" id="rain-input" min="0" step="0.5" placeholder="0.0" inputmode="decimal" />
      <span class="unit">mm</span>
    </div>
    <div class="modal-btns">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" onclick="saveRain()">Save</button>
    </div>
    <button class="clear-btn" id="clear-btn" onclick="clearRain()" style="display:none">Clear this entry</button>
  </div>
</div>

<script>
const VERSION = '1.4';
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const YEAR_COLORS = ['#4a9edd', '#e8884a', '#4caf7d'];

let rainData = {};
let curYear, curMonth, graphYear, editKey;
const now = new Date();

function load() {
  try { rainData = JSON.parse(localStorage.getItem('rainlog') || '{}'); } catch(e) { rainData = {}; }
}
function save() {
  try { localStorage.setItem('rainlog', JSON.stringify(rainData)); } catch(e) {}
}
function dk(y, m, d) {
  return y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
}
function monthTotal(y, m) {
  let t = 0;
  const days = new Date(y, m+1, 0).getDate();
  for (let d = 1; d <= days; d++) { const v = rainData[dk(y,m,d)]; if (v != null) t += v; }
  return t;
}
function yearHasData(y) {
  for (let m = 0; m < 12; m++) {
    const days = new Date(y, m+1, 0).getDate();
    for (let d = 1; d <= days; d++) { if (rainData[dk(y,m,d)] != null) return true; }
  }
  return false;
}
function monthHasData(y, m) {
  const days = new Date(y, m+1, 0).getDate();
  for (let d = 1; d <= days; d++) { if (rainData[dk(y,m,d)] != null) return true; }
  return false;
}
function latestDataMonth() {
  const keys = Object.keys(rainData).sort();
  if (!keys.length) return null;
  const last = keys[keys.length - 1];
  return { y: +last.slice(0,4), m: +last.slice(5,7) - 1 };
}
function latestDataYear() {
  const keys = Object.keys(rainData).sort();
  if (!keys.length) return now.getFullYear();
  return +keys[keys.length - 1].slice(0,4);
}

function init() {
  load();
  curYear = now.getFullYear();
  curMonth = now.getMonth();
  graphYear = curYear;
  renderCalendar();
  setupSwipe();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
}

// ── SWIPE SUPPORT ──────────────────────────────────────────
function setupSwipe() {
  let startX = 0, startY = 0;
  const app = document.getElementById('app');
  app.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  app.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy) * 1.5) return;
    const calActive = document.getElementById('cal-view').classList.contains('active');
    const graphActive = document.getElementById('graph-view').classList.contains('active');
    if (calActive) {
      if (dx < 0) tryChangeMonth(1);
      else tryChangeMonth(-1);
    } else if (graphActive) {
      if (dx < 0) tryChangeGraphYear(1);
      else tryChangeGraphYear(-1);
    }
  }, { passive: true });
}

// ── CALENDAR ───────────────────────────────────────────────
function tryChangeMonth(dir) {
  if (dir === 1) {
    // Don't go forward past current month unless there's data
    const nextM = curMonth === 11 ? 0 : curMonth + 1;
    const nextY = curMonth === 11 ? curYear + 1 : curYear;
    const isAhead = nextY > now.getFullYear() || (nextY === now.getFullYear() && nextM > now.getMonth());
    if (isAhead && !monthHasData(nextY, nextM)) return;
  }
  changeMonth(dir);
}

function changeMonth(dir) {
  curMonth += dir;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  if (curMonth < 0)  { curMonth = 11; curYear--; }
  renderCalendar();
}
function goToday() {
  curYear = now.getFullYear();
  curMonth = now.getMonth();
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('month-title').textContent = MONTHS[curMonth] + ' ' + curYear;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const firstDay = new Date(curYear, curMonth, 1).getDay();
  const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();
  const prevDays = new Date(curYear, curMonth, 0).getDate();
  let total = 0;

  for (let i = 0; i < firstDay; i++) {
    grid.appendChild(makeCell(prevDays - firstDay + 1 + i, true, false, false, null));
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const k = dk(curYear, curMonth, d);
    const rain = rainData[k];
    const isToday = d === now.getDate() && curMonth === now.getMonth() && curYear === now.getFullYear();
    if (rain != null) total += rain;
    const cell = makeCell(d, false, rain != null, isToday, rain);
    cell.addEventListener('click', () => openModal(curYear, curMonth, d));
    grid.appendChild(cell);
  }
  const remaining = 42 - firstDay - daysInMonth;
  for (let i = 1; i <= remaining; i++) {
    grid.appendChild(makeCell(i, true, false, false, null));
  }
  document.getElementById('monthly-total').textContent = 'Total: ' + total.toFixed(1) + ' mm';

  // Disable forward arrow if no data ahead
  const nextM = curMonth === 11 ? 0 : curMonth + 1;
  const nextY = curMonth === 11 ? curYear + 1 : curYear;
  const isAhead = nextY > now.getFullYear() || (nextY === now.getFullYear() && nextM > now.getMonth());
  document.getElementById('cal-next').disabled = isAhead && !monthHasData(nextY, nextM);
}

// Rain intensity colours: pale→deep based on mm
function rainColor(mm) {
  if (mm <= 0)  return null;
  if (mm < 2)   return { bg: '#d6eaf8', num: '#1a5276', val: '#2471a3' };
  if (mm < 10)  return { bg: '#a9cce3', num: '#1a4f6e', val: '#1a5276' };
  if (mm < 25)  return { bg: '#2e86c1', num: '#d6eaf8', val: '#eaf4fb' };
  if (mm < 50)  return { bg: '#1a5276', num: '#d6eaf8', val: '#aed6f1' };
  return              { bg: '#0d2b45', num: '#cce5ff', val: '#90caff' };
}

function makeCell(dayNum, otherMonth, hasRain, isToday, rainVal) {
  const cell = document.createElement('div');
  let cls = 'day-cell';
  if (otherMonth) cls += ' other-month';
  if (isToday) cls += ' today';
  cell.className = cls;

  const numEl = document.createElement('span');
  numEl.className = 'day-num';
  numEl.textContent = dayNum;

  if (rainVal != null && !otherMonth) {
    const c = rainColor(rainVal);
    if (c) { cell.style.background = c.bg; numEl.style.color = c.num; }
    cell.appendChild(numEl);
    const rv = document.createElement('span');
    rv.className = 'rain-val';
    rv.textContent = rainVal % 1 === 0 ? rainVal.toFixed(1) : rainVal;
    if (c) rv.style.color = c.val;
    cell.appendChild(rv);
  } else {
    cell.appendChild(numEl);
  }
  return cell;
}

// ── MODAL ──────────────────────────────────────────────────
function openModal(y, m, d) {
  editKey = dk(y, m, d);
  const rain = rainData[editKey];
  document.getElementById('modal-title').textContent = d + ' ' + SHORT[m] + ' ' + y;
  document.getElementById('rain-input').value = rain != null ? rain : '';
  document.getElementById('clear-btn').style.display = rain != null ? 'block' : 'none';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('rain-input').select(), 80);
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('modal')) closeModal(); }
function haptic(type) {
  if (window.navigator && window.navigator.vibrate) {
    window.navigator.vibrate(type === 'light' ? 30 : 60);
  }
}

function saveRain() {
  const val = parseFloat(document.getElementById('rain-input').value);
  if (!isNaN(val) && val >= 0) { rainData[editKey] = val; save(); haptic('light'); }
  closeModal();
  renderCalendar();
}
function clearRain() {
  delete rainData[editKey];
  save();
  haptic('medium');
  closeModal();
  renderCalendar();
}

// ── VIEW SWITCHING ─────────────────────────────────────────
function switchView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(v + '-view').classList.add('active');
  document.getElementById('nav-' + v).classList.add('active');
  if (v === 'graph') renderGraph();
  if (v === 'history') renderHistory();
}

// ── GRAPH ──────────────────────────────────────────────────
function tryChangeGraphYear(dir) {
  if (dir === 1) {
    const nextY = graphYear + 1;
    if (nextY > now.getFullYear() && !yearHasData(nextY)) return;
  }
  changeGraphYear(dir);
}

function changeGraphYear(dir) {
  graphYear += dir;
  renderGraph();
}

function getYearTotals(y) {
  const totals = [];
  for (let m = 0; m < 12; m++) totals.push(monthTotal(y, m));
  return totals;
}

function renderGraph() {
  const years = [graphYear, graphYear - 1, graphYear - 2];
  const allTotals = years.map(y => getYearTotals(y));

  // Stats for primary year
  const primary = allTotals[0];
  let annualTotal = 0, wetDays = 0, maxMI = 0, maxVal = 0;
  for (let m = 0; m < 12; m++) {
    const days = new Date(graphYear, m+1, 0).getDate();
    for (let d = 1; d <= days; d++) { const v = rainData[dk(graphYear,m,d)]; if (v != null) wetDays++; }
    annualTotal += primary[m];
    if (primary[m] > maxVal) { maxVal = primary[m]; maxMI = m; }
  }

  document.getElementById('graph-year-title').textContent = String(graphYear);
  document.getElementById('graph-total-sub').textContent = annualTotal.toFixed(1) + ' mm total';

  // Disable forward arrow past data
  const nextY = graphYear + 1;
  document.getElementById('graph-next').disabled = nextY > now.getFullYear() && !yearHasData(nextY);

  const globalMax = Math.max(...allTotals.flat(), 1);
  const svg = document.getElementById('graph-svg');
  const W = svg.clientWidth || 350;
  const H = svg.clientHeight || 260;
  const padL = 36, padR = 8, padT = 16, padB = 24;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const barW = (chartW / 12) * 0.5;
  const barGap = chartW / 12;
  const gridLines = 4;
  let svgContent = '';

  for (let i = 0; i <= gridLines; i++) {
    const y = padT + chartH - (i / gridLines) * chartH;
    const val = Math.round((i / gridLines) * globalMax);
    svgContent += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#e8e8e8" stroke-width="0.5"/>`;
    svgContent += `<text x="${padL - 4}" y="${y + 4}" text-anchor="end" font-size="9" fill="#aaa">${val}</text>`;
  }

  for (let m = 0; m < 12; m++) {
    const x = padL + m * barGap + barGap / 2 - barW / 2;
    const val = primary[m];
    const bh = (val / globalMax) * chartH;
    const by = padT + chartH - bh;
    const isCurMonth = graphYear === now.getFullYear() && m === now.getMonth();
    const fill = isCurMonth ? '#4a9edd' : '#1e4976';
    if (val > 0) {
      svgContent += `<rect x="${x}" y="${by}" width="${barW}" height="${bh}" fill="${fill}" rx="2"/>`;
      if (bh > 14) {
        svgContent += `<text x="${x + barW/2}" y="${by - 2}" text-anchor="middle" font-size="8" fill="#555">${Math.round(val)}</text>`;
      }
    }
    svgContent += `<text x="${padL + m * barGap + barGap/2}" y="${H - 4}" text-anchor="middle" font-size="9" fill="#999">${SHORT[m].charAt(0)}</text>`;
  }

  for (let yi = 1; yi <= 2; yi++) {
    const yTotals = allTotals[yi];
    if (!yTotals.some(v => v > 0)) continue;
    const color = YEAR_COLORS[yi];
    let points = '';
    for (let m = 0; m < 12; m++) {
      const cx = padL + m * barGap + barGap / 2;
      const cy = padT + chartH - (yTotals[m] / globalMax) * chartH;
      points += (m === 0 ? `M${cx},${cy}` : ` L${cx},${cy}`);
    }
    svgContent += `<path d="${points}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
    for (let m = 0; m < 12; m++) {
      if (yTotals[m] > 0) {
        const cx = padL + m * barGap + barGap / 2;
        const cy = padT + chartH - (yTotals[m] / globalMax) * chartH;
        svgContent += `<circle cx="${cx}" cy="${cy}" r="3" fill="${color}"/>`;
      }
    }
  }

  svg.innerHTML = svgContent;

  document.getElementById('graph-legend').innerHTML = years.map((y, i) => {
    if (!allTotals[i].some(v => v > 0)) return '';
    const style = i === 0
      ? `background:${YEAR_COLORS[0]}; height:10px; border-radius:2px;`
      : `background:${YEAR_COLORS[i]}; height:3px;`;
    return `<div class="legend-item"><div class="legend-line" style="${style}"></div>${y}</div>`;
  }).join('');

  document.getElementById('stat-grid').innerHTML =
    `<div class="stat-card"><div class="stat-label">Annual total</div><div class="stat-val">${annualTotal.toFixed(1)} <span class="stat-unit">mm</span></div></div>` +
    `<div class="stat-card"><div class="stat-label">Wet days</div><div class="stat-val">${wetDays} <span class="stat-unit">days</span></div></div>` +
    `<div class="stat-card"><div class="stat-label">Wettest month</div><div class="stat-val" style="font-size:18px">${maxVal > 0 ? SHORT[maxMI] : '—'}</div></div>` +
    `<div class="stat-card"><div class="stat-label">Monthly avg</div><div class="stat-val">${annualTotal > 0 ? (annualTotal/12).toFixed(1) : '0'} <span class="stat-unit">mm</span></div></div>`;
}

// ── HISTORY ────────────────────────────────────────────────
function renderHistory() {
  const years = [...new Set(Object.keys(rainData).map(k => k.slice(0,4)))].sort().reverse();
  const el = document.getElementById('history-content');
  if (years.length === 0) {
    el.innerHTML = '<p class="empty-msg">No data yet — start logging on the Calendar tab.</p>';
    return;
  }
  el.innerHTML = years.map(y => {
    const tiles = SHORT.map((name, m) => {
      const t = monthTotal(+y, m);
      return `<div class="month-tile${t > 0 ? ' has-data' : ''}"><div class="m-name">${name}</div><div class="m-val">${t > 0 ? t.toFixed(1) : '—'}</div></div>`;
    }).join('');
    const yr_total = SHORT.reduce((s, _, m) => s + monthTotal(+y, m), 0);
    return `<div class="year-block"><h3>${y} <span style="font-size:13px;font-weight:400;color:#888">${yr_total.toFixed(1)} mm total</span></h3><div class="month-grid">${tiles}</div></div>`;
  }).join('<div style="height:16px;border-bottom:0.5px solid #eee;margin-bottom:16px"></div>');
}

// ── CSV ────────────────────────────────────────────────────
function exportCSV() {
  if (Object.keys(rainData).length === 0) { alert('No data to export yet.'); return; }
  const rows = ['Date,Rainfall (mm)', ...Object.keys(rainData).sort().map(k => k + ',' + rainData[k])];
  const blob = new Blob([rows.join('\n')], {type: 'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'rainlog-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

function importCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const lines = e.target.result.split('\n').map(l => l.trim()).filter(l => l);
    let imported = 0, skipped = 0;
    lines.forEach(line => {
      if (line.startsWith('Date')) return;
      const parts = line.split(',');
      if (parts.length < 2) return;
      const dateStr = parts[0].trim();
      const val = parseFloat(parts[1]);
      if (isNaN(val)) return;
      if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
        rainData[dateStr] = val;
        imported++;
      } else { skipped++; }
    });
    save();
    renderCalendar();
    renderHistory();
    event.target.value = '';
    alert('Imported ' + imported + ' entries.' + (skipped > 0 ? '\n' + skipped + ' rows skipped.' : ''));
  };
  reader.readAsText(file);
}

window.addEventListener('resize', () => {
  if (document.getElementById('graph-view').classList.contains('active')) renderGraph();
});
document.getElementById('rain-input').addEventListener('keydown', e => { if (e.key === 'Enter') saveRain(); });

init();
</script>
